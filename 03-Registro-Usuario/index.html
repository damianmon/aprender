<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>"Registro - Appwise</title>
  </head>
  <body>
    <h1>Únete a la Comunidad Appwise</h1>
    <form action="#">
      <label for="Nombre completo">Nombre completo</label>
      <input
        type="text"
        name=""
        id="Nombre completo"
        placeholder="Ej.Damian"
        required
      />
    </form>
    <form action="">
      <label for="Email">Email</label>
      <input
        type="email"
        id="Email"
        name="Email"
        placeholder="@gmail"
        required
      />
    </form>
    <form action="">
      <label for="Contraseña">Contraseña</label>
      <input
        type="password"
        id="Contraseña"
        placeholder="Ingrese Contraseña"
        required
      />
    </form>
    <h2></h2>
    <form action="">
      <label for="">Fecha de Nacimiento</label>
      <input type="date" />
    </form>
    <form action="">
      <label for="">Nivel en Programación</label>
      <select name="" id="">
        <option value="">Trainee</option>
        <option value="">Junior</option>
        <option value="">Semi-Senior</option>
      </select>
    </form>
    <h3><strong>¿Cuál es tu especialidad favorita?</strong></h3>
    <input type="radio" name="radio" />Frontend
    <input type="radio" name="radio" />Backend
    <h4></h4>
    <input type="checkbox" required /> Acepto los términos y condiciones
    <h5></h5>
    <button type="submit">Crear Cuenta</button>
  </body>
</html>
