<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tareas</title>
  </head>
  <body>
    <main>
      <h1>Mis Tareas Pendientes</h1>
      <section>
        <input type="text" placeholder="¿Qué necesitas hacer hoy?" />
        <button>Agregar Tarea</button>
      </section>
      <ul>
        <li>
          <input type="checkbox" />
          <span>Dormir 8hs</span>
          <button>❌</button>
        </li>
        <li>
          <input type="checkbox" />
          <span>Ir al gimnacio</span>
          <button>❌</button>
          <input type="checkbox" checked />
        </li>
        <li>
          <input type="checkbox" />
          <span>Lipiar el piso</span>
          <button>❌</button>
        </li>
      </ul>
      <p>Tienes 2 tareas pendientes. <button>Limpiar tareas</button></p>
    </main>
  </body>
</html>
